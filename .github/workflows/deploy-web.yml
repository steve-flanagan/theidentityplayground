# Deploys web/ to Azure Static Web Apps.
#
# Note what this workflow does NOT do: deploy an API. Per the spec's hosting
# decision, SWA hosts static files only and the backend lives in a separate
# standalone Function App — SWA's managed API can't run timer triggers, and
# Module 7's lifecycle job needs one. Hence api_location is empty.
#
# We build here rather than letting SWA's Oryx builder do it, so that `tsc -b`
# runs and a type error fails the deploy instead of shipping.

name: Deploy web

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

# Least privilege: the deploy needs to read the repo and comment on PRs with
# the preview URL. Nothing else.
permissions:
  contents: read
  pull-requests: write

# A PRODUCTION DEPLOY IS NEVER CANCELLED. It queues behind whatever is running.
#
# The previous version of this block was `group: deploy-web-${{ github.ref }}` with
# `cancel-in-progress: true` for every event, and it silently ate half the deploys
# to main: 10 of the 20 push-to-main runs between 20 and 23 July finished
# `cancelled`, each within a second or two of starting. The site only ever looked
# current because a later merge happened to win the race. Merging PR #9 lost it, and
# Module 2 sat built-and-not-deployed until the run was re-run by hand.
#
# Two changes, and the first is the one that matters:
#
#   cancel-in-progress is now true only for pull_request. Cancelling a preview build
#   when you push again to the same PR is useful. Cancelling a deploy to the live
#   site is never useful -- it means a merge silently does not ship, and the only
#   signal is a grey tick nobody reads as a failure. Queueing costs a minute.
#
#   github.event_name is in the group key, so a push run and a pull_request run can
#   never land in the same group whatever GitHub resolves github.ref to for a merged
#   PR's close event. That resolution is the part that was never pinned down, and
#   putting the event in the key means it does not have to be.
#
# PR runs still key on the PR number rather than the ref, so the three events that
# share a PR (opened, synchronize, closed) collapse into one group as intended.
#
# Worth knowing when reading run history: this failure looks like NOTHING. A
# cancelled run is grey, not red, so it does not notify, does not fail a branch
# rule, and reads as "someone stopped it on purpose".
concurrency:
  group: deploy-web-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and deploy
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      # `npm ci` not `npm install` — installs exactly the lockfile, and fails
      # if package.json and the lock have drifted apart.
      - name: Install
        run: npm ci
        working-directory: web

      # Runs `tsc -b && vite build`. Type errors stop the deploy here.
      - name: Build
        run: npm run build
        working-directory: web

      - name: Deploy to Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: web/dist
          api_location: ""
          output_location: ""
          skip_app_build: true

  # SWA spins up a preview environment per PR; this tears it down on close.
  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close PR preview
    steps:
      - name: Close preview environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
